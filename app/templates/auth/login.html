{% extends 'base.html' %}
{% block title %}Вход – АИС Гостиница{% endblock %}
{% block content %}
<div class="login-card card">
  <div class="card-body p-4 p-md-5">
    <div class="login-logo"><i class="bi bi-buildings"></i></div>
    <h3 class="text-center fw-bold mb-1">АИС Гостиница</h3>
    <p class="text-center text-muted mb-4">Единая система бронирования, заселения и учёта услуг</p>
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Логин</label>
        <input name="username" class="form-control form-control-lg" autofocus autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Пароль</label>
        <input name="password" type="password" class="form-control form-control-lg" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary btn-lg w-100"><i class="bi bi-box-arrow-in-right me-1"></i> Войти</button>
    </form>
    <div class="alert alert-light border mt-4 mb-0 small">
      По умолчанию: <b>admin</b> / <b>admin123</b>. После первого входа смените пароль.
    </div>
  </div>
</div>
{% endblock %}
